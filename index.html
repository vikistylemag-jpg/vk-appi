<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIKI STYLE</title>
</head>
<body>

<h1>VIKI STYLE</h1>
<p>Мини приложение работает</p>

<script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

<script>
  // Ждём загрузки страницы
  document.addEventListener("DOMContentLoaded", function () {

    if (window.vkBridge) {
      vkBridge.send('VKWebAppInit')
        .then(() => {
          console.log('VK init OK');
        })
        .catch((e) => {
          console.error('VK init error', e);
        });
    } else {
      console.log('vkBridge не найден');
    }

  });
</script>

</body>
</html>
<script>
  setTimeout(() => {
    if (window.vkBridge) {
      vkBridge.send('VKWebAppInit');
    }
  }, 500);
</script>
